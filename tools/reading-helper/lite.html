<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reading Helper Lite</title>
    <link rel="stylesheet" href="lite.css?v=1.0.3">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <!-- Home Screen: Book Selection -->
    <div id="home-view" class="view active">
        <header class="lite-header">
            <h1>FreeThings.win Reading for Kids</h1>
            <div class="level-filters" id="level-filters">
                <button class="filter-btn active" data-level="A">Level A</button>
                <button class="filter-btn" data-level="B">Level B</button>
                <button class="filter-btn" data-level="C">Level C</button>
                <button class="filter-btn" data-level="D">Level D</button>
            </div>
        </header>
        <div class="book-grid" id="book-grid">
            <!-- Books injected by JS -->
        </div>
    </div>

    <!-- Reading Screen -->
    <div id="read-view" class="view">
        <div class="top-bar">
            <button class="icon-btn" id="btn-back" aria-label="Home"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24" style="vertical-align: middle;"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
            <h2 id="book-title">Title</h2>
            <button class="icon-btn" id="btn-read-aloud" aria-label="Read Aloud"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24" style="vertical-align: middle;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
        </div>

        <div class="book-content" id="book-content">
            <img src="" id="page-img" alt="Illustration">
            <div class="text-container" id="page-text">
                <!-- Clickable words injected here -->
            </div>
        </div>

        <div class="bottom-bar">
            <button class="nav-btn" id="btn-prev" aria-label="Previous Page"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="32" height="32" style="vertical-align: middle;"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
            <div class="page-indicator" id="page-indicator">1 / 5</div>
            <button class="nav-btn" id="btn-next" aria-label="Next Page"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="32" height="32" style="vertical-align: middle;"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>
        </div>
    </div>

    <script src="data.js?v=1.0.3"></script>
    <script src="lite.js?v=1.0.3"></script>
</body>
</html>
